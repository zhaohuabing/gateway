gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      namespace: envoy-gateway
      name: gateway-1
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        # expected status: ResolvedRefs: False (PartiallyInvalidCertificateRef), Programmed: True, Accepted: True
        - name: tls-contains-not-exist-ref
          protocol: HTTPS
          port: 443
          allowedRoutes:
            namespaces:
              from: All
          tls:
            mode: Terminate
            certificateRefs:
              - name: tls-secret-ecdsa-1
              - name: not-exist-secret
        # expected status: ResolvedRefs: False (PartiallyInvalidCertificateRef), Programmed: True, Accepted: True
        - name: tls-contains-not-exist-key-cert
          protocol: HTTPS
          port: 8443
          allowedRoutes:
            namespaces:
              from: All
          tls:
            mode: Terminate
            certificateRefs:
              - name: tls-secret-ecdsa-2
              - name: tls-secret-1
        # expected status: ResolvedRefs: False (InvalidCertificateRef), Programmed: False
        - name: tls-all-invalid-cert
          protocol: HTTPS
          port: 8444
          allowedRoutes:
            namespaces:
              from: All
          tls:
            mode: Terminate
            certificateRefs:
              - name: not-exist-secret
secrets:
  - apiVersion: v1
    kind: Secret
    metadata:
      namespace: envoy-gateway
      name: tls-secret-ecdsa-1
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: 
  - apiVersion: v1
    kind: Secret
    metadata:
      namespace: envoy-gateway
      name: tls-secret-ecdsa-2
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: 
  - apiVersion: v1
    kind: Secret
    metadata:
      namespace: envoy-gateway
      name: tls-secret-1
    type: kubernetes.io/tls
    data:
      tls.key: YmFyCg==
httpRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      namespace: default
      name: httproute-1
    spec:
      parentRefs:
        - namespace: envoy-gateway
          name: gateway-1
      rules:
        - matches:
            - path:
                value: "/"
          backendRefs:
            - name: service-1
              port: 8080
