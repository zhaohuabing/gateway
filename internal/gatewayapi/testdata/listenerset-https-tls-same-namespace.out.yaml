    accessLog:
      json:
      - path: /dev/stdout
    globalResources:
      proxyServiceCluster:
        metadata:
          kind: Service
          name: envoy-gateway-composite-gateway-acff6ccf
          namespace: envoy-gateway-system
          sectionName: "8080"
        name: gateway/composite-gateway
        settings:
        - addressType: IP
          endpoints:
          - host: 7.6.5.4
            port: 8080
            zone: zone1
          metadata:
            kind: Service
            name: envoy-gateway-composite-gateway-acff6ccf
            namespace: envoy-gateway-system
            sectionName: "8080"
          name: gateway/composite-gateway
          protocol: TCP
    http:
    - address: 0.0.0.0
      externalPort: 80
      hostnames:
      - '*'
      metadata:
        kind: Gateway
        name: composite-gateway
        namespace: gateway
        sectionName: core-http
      name: gateway/composite-gateway/core-http
      path:
        escapedSlashesAction: UnescapeAndRedirect
        mergeSlashes: true
      port: 10080
    - address: 0.0.0.0
      externalPort: 8443
      hostnames:
      - '*'
      metadata:
        kind: Gateway
        name: composite-gateway
        namespace: gateway
        sectionName: extra-https-same-ns
      name: gateway/composite-gateway/xls/https-xls/extra-https-same-ns
      path:
        escapedSlashesAction: UnescapeAndRedirect
        mergeSlashes: true
      port: 8443
      routes:
      - destination:
          metadata:
            kind: HTTPRoute
            name: route-extra-https
            namespace: default
          name: httproute/default/route-extra-https/rule/0
          settings:
          - addressType: IP
            endpoints:
            - host: 7.7.7.7
              port: 8080
            metadata:
              kind: Service
              name: service-1
              namespace: default
              sectionName: "8080"
            name: httproute/default/route-extra-https/rule/0/backend/0
            protocol: HTTP
            weight: 1
        hostname: '*'
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: route-extra-https
          namespace: default
        name: httproute/default/route-extra-https/rule/0/match/-1/*
      tls:
        alpnProtocols: null
        certificates:
        - certificate: 
          name: xls/tls-secret-1
          privateKey: '[redacted]'
    readyListener:
      address: 0.0.0.0
      ipFamily: IPv4
      path: /ready
      port: 19003
