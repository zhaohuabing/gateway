namespaces:
- apiVersion: v1
  kind: Namespace
  metadata:
    name: gateway
- apiVersion: v1
  kind: Namespace
  metadata:
    name: xls
    labels:
      allow-xls: "true"
gateways:
- apiVersion: gateway.networking.k8s.io/v1
  kind: Gateway
  metadata:
    namespace: gateway
    name: composite-gateway
  spec:
    gatewayClassName: envoy-gateway-class
    allowedListeners:
      namespaces:
        from: Selector
        selector:
          matchLabels:
            allow-xls: "true"
    listeners:
    - name: core-http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
listenerSets:
- apiVersion: gateway.networking.k8s.io/v1
  kind: ListenerSet
  metadata:
    namespace: xls
    name: https-xls
  spec:
    parentRef:
      name: composite-gateway
      namespace: gateway
    listeners:
    - name: extra-https-valid
      protocol: HTTPS
      port: 8443
      tls:
        mode: Terminate
        certificateRefs:
        - group: ""
          kind: Secret
          name: tls-secret-1
          namespace: xls
      allowedRoutes:
        namespaces:
          from: All
    - name: extra-https-missing-cert
      protocol: HTTPS
      port: 8444
      tls:
        mode: Terminate
        certificateRefs:
        - group: ""
          kind: Secret
          name: tls-secret-missing
          namespace: xls
      allowedRoutes:
        namespaces:
          from: All
httpRoutes:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: route-valid
  spec:
    parentRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      namespace: xls
      name: https-xls
      sectionName: extra-https-valid
    rules:
    - backendRefs:
      - name: service-1
        port: 8080
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    namespace: default
    name: route-missing-cert
  spec:
    parentRefs:
    - group: gateway.networking.k8s.io
      kind: ListenerSet
      namespace: xls
      name: https-xls
      sectionName: extra-https-missing-cert
    rules:
    - backendRefs:
      - name: service-1
        port: 8080
secrets:
- apiVersion: v1
  kind: Secret
  metadata:
    namespace: xls
    name: tls-secret-1
  type: kubernetes.io/tls
  data:
    tls.crt: 
    tls.key: 
