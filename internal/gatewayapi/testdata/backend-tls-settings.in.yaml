backendTLSPolicies:
  - apiVersion: gateway.networking.k8s.io/v1alpha2
    kind: BackendTLSPolicy
    metadata:
      name: policy-btls-for-backend-1
      namespace: default
    spec:
      targetRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: backend-1
      validation:
        wellKnownCACertificates: System
        hostname: example.com
        subjectAltNames:
          - type: URI
            uri: spiffe://cluster.local/ns/istio-demo/sa/echo-v1
          - type: Hostname
            hostname: subdomain.secondexample.com
  - apiVersion: gateway.networking.k8s.io/v1alpha2
    kind: BackendTLSPolicy
    metadata:
      name: policy-btls-for-backend-3
      namespace: default
    spec:
      targetRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: backend-3
      validation:
        wellKnownCACertificates: System
        hostname: example.com
  - apiVersion: gateway.networking.k8s.io/v1alpha2
    kind: BackendTLSPolicy
    metadata:
      name: policy-btls-for-backend-4
      namespace: default
    spec:
      targetRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: backend-4
          sectionName: "3001"
      validation:
        wellKnownCACertificates: System
        hostname: example.com
  - apiVersion: gateway.networking.k8s.io/v1alpha2
    kind: BackendTLSPolicy
    metadata:
      name: policy-btls-for-backend-6
      namespace: default
    spec:
      targetRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: backend-6
          sectionName: "3002"
      validation:
        wellKnownCACertificates: System
        hostname: example.com
  - apiVersion: gateway.networking.k8s.io/v1alpha2
    kind: BackendTLSPolicy
    metadata:
      name: policy-btls-for-backend-8
      namespace: envoy-gateway
    spec:
      targetRefs:
        - group: gateway.envoyproxy.io
          kind: Backend
          name: backend-8
      validation:
        wellKnownCACertificates: System
        hostname: example.com
        subjectAltNames:
          - type: URI
            uri: spiffe://cluster.local/ns/istio-demo/sa/echo-v1
          - type: Hostname
            hostname: subdomain.secondexample.com
secrets:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: client-auth
      namespace: envoy-gateway-system
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: 
  - apiVersion: v1
    kind: Secret
    metadata:
      name: client-auth-override
      namespace: envoy-gateway
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: 
  - apiVersion: v1
    kind: Secret
    metadata:
      name: gateway-client-auth
      namespace: envoy-gateway
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: 

backends:
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-1
      namespace: default
    spec:
      # the BackendTLSPolicy should override the one from Backend
      # the generated ir tls settings should contain the tls settings from Backend, BackendTLSPolicy and EnvoyProxy
      tls:
        caCertificateRefs:
          - name: ca-cmap
            group: ""
            kind: ConfigMap
      endpoints:
        - ip:
            address: 1.1.1.1
            port: 3001
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-2
      namespace: default
    spec:
      tls:
        caCertificateRefs:
          - name: ca-cmap
            group: ""
            kind: ConfigMap
        # non-default maxVersion: must be preserved and not reset to the 1.3 default
        maxVersion: tls1.2
      endpoints:
        - ip:
            address: 2.2.2.2
            port: 3001
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-3         # this backend should be accepted because its associated BackendTLSPolicy has a wellKnownCACertificates validation
      namespace: default
    spec:
      tls:
        insecureSkipVerify: false
      endpoints:
        - ip:
            address: 3.3.3.3
            port: 3001
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-4      # this backend should be accepted because its associated BackendTLSPolicy with sectionName has a wellKnownCACertificates validation
      namespace: default
    spec:
      tls:
        insecureSkipVerify: false
      endpoints:
        - ip:
            address: 3.3.3.3
            port: 3001
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-5      # this backend should not be accepted because no CACertificateRefs are specified
      namespace: default
    spec:
      tls: {}
      endpoints:
        - ip:
            address: 3.3.3.3
            port: 3001
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-6      # this backend should not be accepted because the BackendTLSPolicy sectionName does not match the HTTPRoute backendRef port
      namespace: default
    spec:
      tls: {}
      endpoints:
        - ip:
            address: 3.3.3.3
            port: 3001
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-7      # this backend should be accepted and override the client TLS settings from EnvoyProxy
      namespace: envoy-gateway
    spec:
      tls:
        wellKnownCACertificates: System
        clientCertificateRef:
          group: ""
          kind: Secret
          name: client-auth-override
        alpnProtocols:
          - HTTP/2
      endpoints:
        - ip:
            address: 3.3.3.3
            port: 3001
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-8      # this backend should be accepted and override the client TLS settings from EnvoyProxy
      namespace: envoy-gateway
    spec:
      endpoints:
        - ip:
            address: 3.3.3.3
            port: 3001
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-9      # this backend should be accepted and alpn should be disabled
      namespace: envoy-gateway
    spec:
      tls:
        wellKnownCACertificates: System
        clientCertificateRef:
          group: ""
          kind: Secret
          name: client-auth-override
        alpnProtocols: []
      endpoints:
        - ip:
            address: 3.3.3.3
            port: 3001
  - apiVersion: gateway.envoyproxy.io/v1alpha1
    kind: Backend
    metadata:
      name: backend-10     # this backend should keep ALPN unset when neither Backend nor EnvoyProxy configures it
      namespace: envoy-gateway
    spec:
      tls:
        wellKnownCACertificates: System
      endpoints:
        - ip:
            address: 3.3.3.3
            port: 3001
