gateways:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: gateway-tls-frontend-backend
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
        - name: https
          port: 8443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
      tls:
        frontend:
          default:
            validation:
              mode: AllowValidOnly
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: tls-validity-checks-ca-certificate
          perPort:
            - port: 8443
              tls:
                validation:
                  mode: AllowValidOnly
                  caCertificateRefs:
                    - kind: ConfigMap
                      group: ""
                      name: tls-validity-checks-per-port-ca-certificate
        backend:
          clientCertificateRef:
            group: ""
            kind: Secret
            name: certificate
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: invalid-default-client-validation-config
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      tls:
        frontend:
          default:
            validation:
              mode: AllowValidOnly
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: does-not-exist
          perPort:
            - port: 80
              tls:
                validation:
                  mode: AllowValidOnly
                  caCertificateRefs:
                    - kind: ConfigMap
                      group: ""
                      name: tls-validity-checks-per-port-ca-certificate
      listeners:
        - name: https
          port: 443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: client-validation-insecure-fallback
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      tls:
        frontend:
          default:
            validation:
              mode: AllowInsecureFallback
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: tls-validity-checks-ca-certificate
          perPort:
            - port: 8443
              tls:
                validation:
                  mode: AllowInsecureFallback
                  caCertificateRefs:
                    - kind: ConfigMap
                      group: ""
                      name: tls-validity-checks-per-port-ca-certificate
      listeners:
        - name: https
          port: 443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
        - name: https-with-hostname
          port: 8443
          hostname: second-example.org
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: client-validation-default
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      tls:
        frontend:
          default:
            validation:
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: tls-validity-checks-ca-certificate
          perPort:
            - port: 8443
              tls:
                validation:
                  caCertificateRefs:
                    - kind: ConfigMap
                      group: ""
                      name: tls-validity-checks-per-port-ca-certificate
      listeners:
        - name: https
          port: 443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
        - name: https-with-hostname
          port: 8443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: client-validation-per-port-disable-default
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      tls:
        frontend:
          default:
            validation:
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: tls-validity-checks-ca-certificate
          perPort:
            - port: 8443
              tls: {}
      listeners:
        - name: https
          port: 443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
        - name: https-disable-default-validation
          port: 8443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: client-validation-per-port-disable-invalid-default
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      tls:
        frontend:
          default:
            validation:
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: does-not-exist
          perPort:
            - port: 8443
              tls: {}
      listeners:
        - name: https-invalid-default
          port: 443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
        - name: https-disable-default-validation
          port: 8443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: invalid-gateway-backend-client-cert-no-fallback
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      listeners:
        - name: http
          port: 8080
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
      tls:
        backend:
          clientCertificateRef:
            group: ""
            kind: ConfigMap
            name: invalid-kind
  - apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: gateway-with-invalid-client-cert-validation
      namespace: envoy-gateway
    spec:
      gatewayClassName: envoy-gateway-class
      tls:
        frontend:
          default:
            validation:
              caCertificateRefs:
                - kind: ConfigMap
                  group: ""
                  name: tls-validity-checks-ca-certificate
          perPort:
            - port: 7443
              tls:
                validation:
                  caCertificateRefs:
                    - kind: ConfigMap
                      group: ""
                      name: non-exisitng-cm
            - port: 8443
              tls:
                validation:
                  caCertificateRefs:
                    - kind: Service
                      group: ""
                      name: infra-backend-v2
            - port: 6443
              tls:
                validation:
                  caCertificateRefs:
                    - kind: ConfigMap
                      group: ""
                      name: web-backend-cm
                      namespace: default
      listeners:
        - name: https
          port: 443
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
        - name: https-unresolved
          port: 7443
          hostname: first-example.org
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
        - name: https-invalid-kind
          port: 8443
          hostname: second-example.org
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
                namespace: gateway-conformance-infra
        - name: https-grant-missing
          port: 6443
          hostname: fourth-example.org
          protocol: HTTPS
          allowedRoutes:
            namespaces:
              from: Same
          tls:
            certificateRefs:
              - group: ""
                kind: Secret
                name: tls-validity-checks-certificate
httpRoutes:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: gateway-tls-frontend-backend
      namespace: default
    spec:
      parentRefs:
        - name: gateway-tls-frontend-backend
          namespace: envoy-gateway
      hostnames:
        - example.org
      rules:
        - backendRefs:
            - name: service-1
              port: 8080
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: invalid-default-client-validation-config
      namespace: default
    spec:
      parentRefs:
        - name: invalid-default-client-validation-config
          namespace: envoy-gateway
      hostnames:
        - example.org
      rules:
        - backendRefs:
            - name: service-1
              port: 8080
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: invalid-gateway-backend-client-cert-no-fallback
      namespace: default
    spec:
      parentRefs:
        - name: invalid-gateway-backend-client-cert-no-fallback
          namespace: envoy-gateway
      hostnames:
        - mTLS.example.org
      rules:
        - backendRefs:
            - name: tls-backend
              namespace: default
              port: 443
services:
  - apiVersion: v1
    kind: Service
    metadata:
      name: tls-backend
      namespace: default
    spec:
      clusterIP: 10.22.33.44
      ports:
        - port: 443
          name: https
          protocol: TCP
          targetPort: 443
endpointSlices:
  - apiVersion: discovery.k8s.io/v1
    kind: EndpointSlice
    metadata:
      name: endpointslice-tls-backend
      namespace: default
      labels:
        kubernetes.io/service-name: tls-backend
    addressType: IPv4
    ports:
      - name: https
        protocol: TCP
        port: 443
    endpoints:
      - addresses:
          - "10.244.0.22"
        conditions:
          ready: true
backendTLSPolicies:
  - apiVersion: gateway.networking.k8s.io/v1alpha2
    kind: BackendTLSPolicy
    metadata:
      name: tls-backend-policy
      namespace: default
    spec:
      targetRefs:
        - group: ""
          kind: Service
          name: tls-backend
      validation:
        wellKnownCACertificates: System
        hostname: backend.example.org
envoyProxyForGatewayClass:
  apiVersion: gateway.envoyproxy.io/v1alpha1
  kind: EnvoyProxy
  metadata:
    namespace: envoy-gateway-system
    name: backend-client-cert-default
  spec:
    backendTLS:
      clientCertificateRef:
        group: ""
        kind: Secret
        name: global-backend-client-cert
secrets:
  - apiVersion: v1
    kind: Secret
    metadata:
      namespace: envoy-gateway
      name: tls-validity-checks-certificate
    type: kubernetes.io/tls
    data:
      tls.crt: 
      tls.key: 
  - apiVersion: v1
    kind: Secret
    metadata:
      namespace: envoy-gateway-system
      name: global-backend-client-cert
    type: kubernetes.io/tls
    data:
      tls.crt: YQ==
      tls.key: Yg==
configmaps:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: tls-validity-checks-ca-certificate
      namespace: envoy-gateway
    data:
      ca.crt: 
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: tls-validity-checks-per-port-ca-certificate
      namespace: envoy-gateway
    data:
      ca.crt: 
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: web-backend-cm
      namespace: default
    data:
      ca.crt: 
